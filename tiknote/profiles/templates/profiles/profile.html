{% extends "base.html" %} {% block content %}
<h2>Your Profile</h2>

<form method="post">
  {% csrf_token %} {{ form.as_p }}
  <button type="submit" class="btn btn-primary">Save</button>
</form>

<hr />

<h3>Video Sync</h3>
<p>Sync Preference: {{ profile.get_sync_preference_display }}</p>
<p>Last Synced: {{ profile.last_synced|default:"Never" }}</p>

<a href="{% url 'profiles:sync_now' %}" class="btn btn-success">
  🔄 Sync Now
</a>
{% endblock %}
