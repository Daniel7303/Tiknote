{% extends 'base.html' %} {% block content %}
<div class="min-h-screen bg-gray-50 py-10 px-4">
  <div class="max-w-3xl mx-auto bg-white rounded-2xl p-6 shadow-sm">
    <h1 class="text-2xl font-semibold text-gray-900 mb-2">
      {{ transcription.title|default:"Untitled Video" }}
    </h1>

    <div class="flex items-center text-sm text-gray-400 mb-4">
      <span>{{ transcription.language|upper }}</span>
      <span class="mx-2">•</span>
      <span>{{ transcription.created_at|date:"M d, Y" }}</span>
    </div>

    <div class="prose max-w-none text-gray-800 whitespace-pre-line">
      {{ transcription.text }}
    </div>

    <div class="mt-6">
      <a
        href="{% url 'transcripts:feed' %}"
        class="text-blue-600 hover:text-blue-800"
        >← Back to Feed</a
      >
    </div>
  </div>
</div>
{% endblock %}
