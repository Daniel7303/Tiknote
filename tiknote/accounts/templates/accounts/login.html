<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login with TikTok</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f2f2f2;
      }
      .container {
        background: white;
        padding: 2rem 3rem;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      a.tiktok-btn {
        display: inline-block;
        background-color: #000;
        color: #fff;
        padding: 0.8rem 1.5rem;
        text-decoration: none;
        border-radius: 8px;
        font-size: 1rem;
        transition: background 0.3s;
      }
      a.tiktok-btn:hover {
        background-color: #333;
      }
      img {
        width: 40px;
        vertical-align: middle;
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Login with TikTok</h2>
      <p>Connect your TikTok account to continue.</p>
      <a class="tiktok-btn" href="{% url 'accounts:tiktok_login' %}">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg"
          alt="TikTok Logo"
        />
        Continue with TikTok
      </a>
    </div>
  </body>
</html>
